name: like_a_local_2
description: "LikeALocal - Premium Travel Experience with AI Guide"
# Prevents accidental publication to pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management (for Flutter-native screens if needed)
  provider: ^6.1.2

  # WebView for embedding your HTML file on Android & iOS
  webview_flutter: ^4.8.0

  # Firebase (optional - your HTML uses JS SDK directly)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  # Utilities
  shared_preferences: ^2.3.2

  # Cupertino icons for iOS-style UI elements
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 🔥 CRITICAL: Include your HTML file as an asset for WebView
  assets:
    - assets/index.html
    - assets/

  # Optional: Add custom fonts if your HTML uses them
  # fonts:
  #   - family: Space Grotesk
  #     fonts:
  #       - asset: assets/fonts/SpaceGrotesk-Regular.ttf
  #       - asset: assets/fonts/SpaceGrotesk-Bold.ttf
  #         weight: 700
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700